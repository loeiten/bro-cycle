---
fail_fast: true
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-added-large-files
      - id: check-case-conflict
      - id: check-illegal-windows-names
      - id: check-merge-conflict
      - id: check-symlinks
      - id: check-yaml
      - id: debug-statements
      - id: detect-private-key
      - id: end-of-file-fixer
      - id: mixed-line-ending
      - id: trailing-whitespace
  - repo: https://github.com/markdownlint/markdownlint/
    rev: v0.15.0
    hooks:
      - id: markdownlint
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.0
    hooks:
      - id: gitleaks
  - repo: local
    hooks:
      - id: prettier
        name: Prettier (format check)
        entry: npx prettier --check
        language: system
        types_or: [javascript, jsx, ts, tsx, json, markdown, yaml]
      - id: eslint
        name: ESLint (lint check)
        entry: npx eslint --max-warnings=0
        language: system
        types_or: [javascript, jsx, ts, tsx]
      - id: typescript
        name: TypeScript (type check)
        entry: node node_modules/typescript/lib/tsc.js --noEmit
        language: system
        types_or: [ts, tsx]
        pass_filenames: false
      - id: jest
        name: Jest (tests)
        entry: bash -c 'NODE_OPTIONS="--localstorage-file=/tmp/jest-ls" npx jest --bail --forceExit --passWithNoTests'
        language: system
        types_or: [ts, tsx]
        pass_filenames: false
